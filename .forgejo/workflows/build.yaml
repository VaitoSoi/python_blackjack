on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
      
jobs:
  lint:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Lint
        run: uvx ruff check .

  docker:
    needs: lint
    
    runs-on: docker

    services:
      docker-daemon:
        image: docker:dind
        options: --privileged --dns 8.8.8.8 --dns 8.8.4.4 # Required for DinD to function
    
    env:
      # Forgejo registry
      DOCKER_HOST: tcp://docker-daemon:2375
      REGISTRY: git.vaito.dev
      IMAGE_NAME: git.vaito.dev/${{ github.repository }} # owner/repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Forgejo container registry
        env:
          USERNAME: ${{ secrets.FORGEJO_USERNAME }}
          PASSWORD: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          echo "$PASSWORD" | docker login "${REGISTRY}" -u "${USERNAME}" --password-stdin

      # - name: Create Docker context for remote daemon (TLS)
      #   run: |
      #     set -ex
      #     if [[ $DOCKER_TLS_VERIFY = "1" ]]; then
      #       docker context rm -f remote || true;
      #       docker context create remote \
      #         --docker "host=${DOCKER_HOST},ca=${DOCKER_CERT_PATH}/ca.pem,cert=${DOCKER_CERT_PATH}/cert.pem,key=${DOCKER_CERT_PATH}/key.pem";
      #       unset DOCKER_HOST;
      #       docker context use remote;
      #       echo "Created context remote";
      #       docker context inspect remote;
      #     else
      #       echo "Use default context";
      #     fi

      - name: Build buildx driver
        run: |
          set -eux
          
          docker buildx rm -f multi || true
          docker buildx create \
            --name multi \
            --driver remote $AMD_BUILD_REMOTE \
            --use \
            --bootstrap
          docker buildx create \
            --name multi \
            --append $ARM_BUILD_REMOTE

      - name: Build image
        run: |
          docker buildx build \
            --builder multi \
            --platform linux/amd64,linux/arm64 \
            -t "${IMAGE_NAME}:dev-${{ forgejo.run_number }}" \
            -t "${IMAGE_NAME}:dev-latest" \
            --push .